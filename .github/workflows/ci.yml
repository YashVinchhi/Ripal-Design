name: CI Build, Test, and Publish Containers

on:
  push:
    branches: ['Prod', 'main', 'ripal-design', 'NEW']
  pull_request:
    branches: ['main', 'ripal-design']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --optimize-autoloader

      - name: Run PHPStan
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "No PHPStan config found, skipping."
          fi

      - name: Run PHPUnit
        run: |
          if [ -f phpunit.xml ]; then
            vendor/bin/phpunit --configuration phpunit.xml
          elif [ -f phpunit.xml.dist ]; then
            vendor/bin/phpunit --configuration phpunit.xml.dist
          else
            echo "No PHPUnit config found, skipping."
          fi

      - name: Run PHP-CS-Fixer (PSR-12)
        run: |
          if [ -f .php-cs-fixer.php ] || [ -f .php-cs-fixer.dist.php ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff --verbose
          else
            echo "No PHP-CS-Fixer config found, skipping."
          fi

      - name: Run PHP syntax check
        run: |
          find . -name '*.php' -not -path './vendor/*' -not -path './docs/*' -not -path './tools/*' -print0 | xargs -0 -n1 php -l

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase repo name
        id: repo_meta
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (app)
        id: app_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo_meta.outputs.repo_lower }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata (mysql)
        id: mysql_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo_meta.outputs.repo_lower }}-mysql
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.app_meta.outputs.tags }}
          labels: ${{ steps.app_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push seeded mysql image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/mysql/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.mysql_meta.outputs.tags }}
          labels: ${{ steps.mysql_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
