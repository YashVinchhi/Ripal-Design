name: CI Build & Publish Image

on:
  push:
    branches: ['Prod', 'main', 'ripal-design']
  pull_request:
    branches: ['main', 'ripal-design']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --optimize-autoloader

      - name: Run PHPStan
        run: |
          if [ -f phpstan.neon ] || [ -f phpstan.neon.dist ]; then
            vendor/bin/phpstan analyse --no-progress
          else
            echo "No PHPStan config found, skipping."
          fi

      - name: Run PHPUnit
        run: |
          if [ -f phpunit.xml ]; then
            vendor/bin/phpunit --configuration phpunit.xml
          elif [ -f phpunit.xml.dist ]; then
            vendor/bin/phpunit --configuration phpunit.xml.dist
          else
            echo "No PHPUnit config found, skipping."
          fi

      - name: Run PHP-CS-Fixer (PSR-12)
        run: |
          if [ -f .php-cs-fixer.php ] || [ -f .php-cs-fixer.dist.php ]; then
            vendor/bin/php-cs-fixer fix --dry-run --diff --verbose
          else
            echo "No PHP-CS-Fixer config found, skipping."
          fi

      - name: Run PHP syntax check
        run: |
          find . -name '*.php' -not -path './vendor/*' -not -path './docs/*' -not -path './tools/*' -print0 | xargs -0 -n1 php -l

      - name: Compute lowercase repo name
        id: repo_meta
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Install production Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.repo_meta.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.repo_meta.outputs.repo_lower }}:${{ github.sha }}
