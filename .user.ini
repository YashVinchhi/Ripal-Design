; Increase upload limits for large project file uploads (set to 450MB)
upload_max_filesize = 450M
post_max_size = 460M
memory_limit = 1024M
max_execution_time = 600
max_input_time = 600
display_errors = Off
display_startup_errors = Off
log_errors = On
expose_php = Off
session.cookie_httponly = 1
session.cookie_samesite = Strict
