services:
  app:
    image: ${IMAGE_NAME:-ghcr.io/yashvinchhi/ripal-design:latest}
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-app}
      - DB_PASS=${DB_PASS:-app_password}
      - DB_NAME=${DB_NAME:-Ripal-Design}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_FROM=${MAIL_FROM}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: ${MYSQL_IMAGE:-ghcr.io/yashvinchhi/ripal-design-mysql:latest}
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-Ripal-Design}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASS:-app_password}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
