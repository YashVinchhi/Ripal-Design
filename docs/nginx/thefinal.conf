server {
    listen 80;
    server_name _;
    root /var/www/thefinal/public;
    index index.php index.html;

    client_max_body_size 460M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xhtml+xml;

    error_page 404 /404.php;

    location / {
        try_files $uri $uri/ /404.php?$query_string;
    }

    location ~* ^/projects/([A-Za-z0-9-]+)/?$ {
        rewrite ^/projects/([A-Za-z0-9-]+)/?$ /project_view.php?slug=$1 last;
    }

    location ~* ^/(phpmyadmin|pma|mysql|db)(/|$) {
        deny all;
    }

    location ~* ^/(app|sql|includes|scripts|logs|storage|stubs|tests|vendor)/ {
        deny all;
    }

    location ~* ^/(?:uploads|assets)/.*\.(?:php[0-9]?|phtml|phar|pl|py|cgi|asp|aspx|jsp|sh|bash)$ {
        deny all;
    }

    location ~* ^/Common/.*\.php$ {
        deny all;
    }

    location ~* \.(?:css|js)$ {
        expires 7d;
        try_files $uri =404;
    }

    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        expires 30d;
        try_files $uri =404;
    }

    location ~* ^/(\.env|\.git|composer\.(?:json|lock)|package(?:-lock)?\.json|phpunit\.xml(?:\.dist)?|.*\.(?:sql|bak|backup|old|orig|swp|log))$ {
        deny all;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_read_timeout 600;
        fastcgi_param PHP_ADMIN_VALUE "open_basedir=/var/www/thefinal/:/tmp/:/proc/";
        fastcgi_param PHP_VALUE "upload_max_filesize=450M
post_max_size=460M
memory_limit=1024M
max_execution_time=600
max_input_time=600
display_errors=Off
display_startup_errors=Off
log_errors=On
expose_php=Off
session.cookie_httponly=1
session.cookie_samesite=Strict";
    }

    location ~ /\.(?!well-known/) {
        deny all;
    }
}

