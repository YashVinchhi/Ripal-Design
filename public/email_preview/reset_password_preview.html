<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password Email Preview</title>
  <style>
    body { margin: 0; padding: 24px; background: #f4f4f5; font-family: Arial, sans-serif; color: #111827; }
    .card { max-width: 620px; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 28px; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    p { margin: 0 0 14px; line-height: 1.55; }
    .btn { display: inline-block; background: #731209; color: #ffffff !important; text-decoration: none; padding: 12px 18px; border-radius: 6px; font-weight: 600; }
    .meta { margin-top: 22px; color: #6b7280; font-size: 12px; border-top: 1px solid #e5e7eb; padding-top: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Your Password</h1>
    <p>Hello {{user_name}},</p>
    <p>We received a request to reset your password. Click below to set a new one.</p>
    <p><a class="btn" href="{{reset_link}}" target="_blank" rel="noopener">Reset Password</a></p>
    <p>If the button does not work, use this link: <a href="{{reset_link}}">{{reset_link}}</a></p>
    <p class="meta">Placeholders: {{user_name}}, {{first_name}}, {{full_name}}, {{reset_link}}</p>
  </div>
</body>
</html>
