<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="ico/images.ico">
    <title>Login-form</title>
    <link rel="stylesheet" href="/login/login.css">

</head>

<body>

    <div class="main">
        <h1>Login Form</h1>
        <form class="login-form" novalidate>
            <div class="user-input">
                <input type="text" class="User" name="username" placeholder="Username" required autofocus>
            </div>
            <div class="user-password">
                <input type="password" name="password" placeholder="password" id="password" class="password" required>
                <img src="eye/eye-off.svg" id="eyeicon">
            </div>
            <div class="account">
                <p>You don't have an account? <a href="Signup.html">Sign up</a></p>
            </div>
            <div class="submit-button">
                <button type="submit">Submit</button>
            </div>
            <div class="status" aria-live="polite"></div>
        </form>
    </div>

    <script src="/login/login.js"></script>
</body>

</html>
